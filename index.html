<html lang="en">
<head>
<meta charset="UTF-8">

<title>Xclusic — Lamb Music Works</title>
<meta name="description" content="Xclusic — licensed in-store streaming for Lamb Music Works partner merchants.">
<meta name="theme-color" content="#F4ECDD">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/favicon-32.png">
<link rel="apple-touch-icon" href="assets/icon-180.png">

<style>
:root{
  --champagne:#F4ECDD;
  --champagne-deep:#ECE1CC;
  --cream:#FFFDF7;
  --ink:#241D14;
  --ink-soft:#4A3F30;
  --gold:#C9974A;
  --gold-bright:#E0B262;
  --yellow:#FFD140;
  --line:#E2D6BD;
  --danger:#A8432F;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--champagne);
  color:var(--ink);
  min-height:100vh;
  -webkit-tap-highlight-color:transparent;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input{font-family:inherit;}

/* ============ LOCK SCREEN ============ */
#lockScreen{
  position:fixed;inset:0;z-index:50;
  background:radial-gradient(120% 120% at 50% 0%, var(--champagne) 0%, var(--champagne-deep) 100%);
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}
.lock-card{
  width:100%;max-width:380px;
  background:var(--cream);
  border:1px solid var(--line);
  border-radius:20px;
  padding:36px 28px 30px;
  box-shadow:0 20px 60px rgba(36,29,20,0.12);
  text-align:center;
}
.lock-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:24px;}
.lock-logo-img{width:220px;height:auto;}
.lock-sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:26px;line-height:1.5;}
.field{margin-bottom:14px;text-align:left;}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:0.5px;color:var(--ink-soft);text-transform:uppercase;margin-bottom:6px;}
.field input{
  width:100%;padding:13px 14px;border-radius:10px;border:1.5px solid var(--line);
  background:#fff;font-size:15px;color:var(--ink);outline:none;
}
.field input:focus{border-color:var(--gold);}
#unlockBtn{
  width:100%;padding:14px;border-radius:10px;background:var(--ink);color:var(--cream);
  font-size:14px;font-weight:700;letter-spacing:0.5px;margin-top:8px;
}
#unlockBtn:active{opacity:0.85;}
#lockError{color:var(--danger);font-size:12.5px;margin-top:10px;min-height:16px;}
.lock-legal{font-size:10.5px;color:#9A8C72;margin-top:22px;line-height:1.5;}

/* ============ APP HEADER ============ */
#app{display:none;min-height:100vh;flex-direction:column;}
#app.active{display:flex;}
header.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px;background:var(--champagne);
  position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);
}
.brand-mini{display:flex;align-items:center;}
.brand-mini-img{height:54px;width:auto;}
.partner-chip{font-size:11px;font-weight:700;color:var(--ink-soft);background:var(--champagne-deep);padding:6px 10px;border-radius:20px;}
#adminGear{font-size:18px;color:var(--ink-soft);padding:6px;}

/* ============ NOW PLAYING / VISUALIZER ============ */
.now-playing{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px 10px;text-align:center;}
.vinyl-wrap{position:relative;width:230px;height:230px;margin-bottom:8px;}
.tonearm{position:absolute;top:-14px;right:18px;width:90px;height:90px;transform-origin:88px 8px;transform:rotate(-32deg);transition:transform .5s ease;z-index:3;}
.tonearm.playing{transform:rotate(-8deg);}
.tonearm svg{width:100%;height:100%;}
.vinyl{
  width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 50% 50%, #2c2316 0%, var(--ink) 60%, #1a140d 100%);
  position:relative;box-shadow:0 18px 40px rgba(36,29,20,0.3);
  animation:spin 7s linear infinite;animation-play-state:paused;
}
.vinyl.playing{animation-play-state:running;}
.vinyl::before,.vinyl::after{content:"";position:absolute;border:1px solid rgba(201,151,74,0.35);border-radius:50%;}
.vinyl::before{inset:18px;}
.vinyl::after{inset:42px;}
.vinyl .ring3{position:absolute;inset:66px;border:1px solid rgba(201,151,74,0.35);border-radius:50%;}
.vinyl .label{position:absolute;inset:78px;border-radius:50%;background:var(--gold-bright);display:flex;align-items:center;justify-content:center;}
.vinyl .label .hole{width:9px;height:9px;border-radius:50%;background:var(--ink);}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.track-title{font-size:19px;font-weight:800;margin-top:18px;max-width:300px;}
.track-artist{font-size:13px;color:var(--ink-soft);margin-top:3px;}

/* ============ TRANSPORT ============ */
.transport{display:flex;align-items:center;justify-content:center;gap:14px;padding:14px 16px 6px;}
.transport button{font-size:20px;color:var(--ink);}
.transport .play-btn{width:54px;height:54px;border-radius:50%;background:var(--ink);color:var(--cream);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.transport .sm{font-size:18px;color:var(--ink-soft);}
.transport .seek-btn{font-size:17px;color:var(--ink-soft);position:relative;}
.transport .toggled{color:var(--gold);}
.labeled-btn{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;}
.labeled-btn span.lbl{font-size:9px;font-weight:700;letter-spacing:0.3px;color:var(--ink-soft);text-transform:uppercase;}
.labeled-btn.toggled span.lbl{color:var(--gold);}
.progress-row{display:flex;align-items:center;gap:8px;padding:0 20px;margin-bottom:4px;}
.progress-row .time{font-size:11px;color:var(--ink-soft);min-width:34px;text-align:center;flex-shrink:0;}
.progress-row input[type=range]{flex:1;accent-color:var(--gold);}
.volume-row{display:flex;align-items:center;gap:10px;padding:6px 30px 16px;}
.volume-row input[type=range]{flex:1;accent-color:var(--gold);}

/* ============ DRAWER ============ */
.drawer{background:var(--cream);border-top:1px solid var(--line);border-radius:18px 18px 0 0;
  margin-top:auto;}
.drawer-tabs{display:flex;border-bottom:1px solid var(--line);}
.drawer-tabs button{flex:1;padding:14px 0;font-size:12.5px;font-weight:700;letter-spacing:0.4px;color:var(--ink-soft);
  border-bottom:2px solid transparent;text-transform:uppercase;}
.drawer-tabs button.active{color:var(--ink);border-bottom-color:var(--gold);}
.search-row{padding:12px 16px;}
.search-row input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--line);background:#fff;font-size:13.5px;}
.track-list{max-height:340px;overflow-y:auto;padding-bottom:90px;}
.track-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid #F0E8D6;}
.track-row:active{background:var(--champagne-deep);}
.track-num{width:22px;text-align:center;font-size:12px;color:var(--ink-soft);flex-shrink:0;}
.track-row.current .track-num,.track-row.current .t-title{color:var(--gold);}
.eq-icon{display:flex;align-items:flex-end;gap:1.5px;height:13px;}
.eq-icon span{width:2.5px;background:var(--gold);animation:eqbar .9s ease-in-out infinite;}
.eq-icon span:nth-child(1){height:40%;animation-delay:0s;}
.eq-icon span:nth-child(2){height:100%;animation-delay:.2s;}
.eq-icon span:nth-child(3){height:65%;animation-delay:.4s;}
@keyframes eqbar{0%,100%{transform:scaleY(0.4)}50%{transform:scaleY(1)}}
.t-info{flex:1;min-width:0;}
.t-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-dur{font-size:11.5px;color:var(--ink-soft);flex-shrink:0;}
.empty-row{padding:30px 16px;text-align:center;color:var(--ink-soft);font-size:13px;}

/* ============ MINI PLAYER ============ */
.mini-player{position:fixed;left:0;right:0;bottom:0;background:var(--cream);border-top:1px solid var(--line);
  display:none;align-items:center;gap:12px;padding:9px 14px;box-shadow:0 -6px 18px rgba(36,29,20,0.08);z-index:15;}
.mini-player.show{display:flex;}
.mini-disc{width:36px;height:36px;border-radius:50%;flex-shrink:0;animation:spin 7s linear infinite;animation-play-state:paused;}
.mini-disc.playing{animation-play-state:running;}
.mini-info{flex:1;min-width:0;}
.mini-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mini-artist{font-size:11px;color:var(--ink-soft);}
.mini-player button{font-size:18px;color:var(--ink);padding:4px;}

/* ============ ADMIN ============ */
#adminScreen{position:fixed;inset:0;background:var(--champagne);z-index:60;display:none;overflow-y:auto;}
#adminScreen.show{display:block;}
.admin-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);}
.admin-header h2{font-size:16px;font-weight:800;}
.admin-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px;}
.stat-card{background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:14px;}
.stat-card .n{font-size:22px;font-weight:800;}
.stat-card .l{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.5px;}
.partner-list{padding:0 16px 90px;}
.partner-item{background:var(--cream);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.partner-item .row1{display:flex;justify-content:space-between;font-size:13.5px;font-weight:700;}
.partner-item .row2{font-size:11.5px;color:var(--ink-soft);margin-top:3px;}
.admin-pin-gate{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
</style>
</head>

    <div class="lock-logo">
      <img src="assets/xclusic-logo-light.png" alt="Xclusic" class="lock-logo-img">

<!-- ============ MAIN APP ============ -->
<div id="app">

      <button class="active" data-tab="catalog" onclick="setDrawerTab('catalog')">Catalog</button>
      <button data-tab="upnext" onclick="setDrawerTab('upnext')">Up Next</button>

  </div>
</div>

<!-- ============ MINI PLAYER ============ -->
<div class="mini-player" id="miniPlayer">
  <img src="assets/disc-mark-64.png" alt="" class="mini-disc" id="miniDisc">
  <div class="mini-info">
    <div class="mini-title" id="miniTitle">—</div>
    <div class="mini-artist" id="miniArtist">Zairey</div>
  </div>
  <button onclick="togglePlay()" id="miniPlayBtn">▶</button>
  <button onclick="nextTrack()">⏭</button>
</div>

<!-- ============ ADMIN ============ -->
<div id="adminScreen">
  <div id="adminPinGate" class="admin-pin-gate">
    <div class="lock-card" style="max-width:300px;">
      <div class="field"><label>Admin PIN</label><input type="password" id="adminPinInput" inputmode="numeric"></div>
      <button id="unlockBtn" onclick="checkAdminPin()">Enter</button>
      <div id="adminPinError" style="color:var(--danger);font-size:12px;margin-top:8px;"></div>

    </div>
    <div class="admin-stats" id="adminStats"></div>

</div>

<script>

/* ============================================================

const catalog = [

/* ============================================================
   STATE
   ============================================================ */
let partnerCode = null;
let audio = new Audio();
let currentIndex = -1;
let isPlaying = false;
let shuffleOn = false;
let repeatMode = 0; // 0 off, 1 all, 2 one
let drawerTab = 'catalog';
let recentIds = [];
let queueOverride = [];
let sessionId = null;

/* ============================================================
   UNLOCK FLOW
   ============================================================ */
async function attemptUnlock(){
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  const pin = document.getElementById('pinInput').value.trim();
  const errEl = document.getElementById('lockError');
  errEl.textContent = "";
  if(!code || !pin){ errEl.textContent = "Enter both your code and PIN."; return; }

  try{
    const { data, error } = await sb.from('songdrop_partners').select('*').eq('code', code).single();
    if(error || !data){ errEl.textContent = "Code not recognized."; return; }
    if(String(data.access_pin) !== String(pin)){ errEl.textContent = "Incorrect PIN."; return; }

    partnerCode = code;
    localStorage.setItem('sde_partner_code', code);
    localStorage.setItem('sde_partner_pin', pin);
    document.getElementById('partnerChip').textContent = code;

    await sb.from('songdrop_partners').update({ last_active: new Date().toISOString() }).eq('code', code);
    const { data: sess } = await sb.from('songdrop_sessions').insert({ partner_code: code, started_at: new Date().toISOString() }).select().single();
    if(sess) sessionId = sess.id;

    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('app').classList.add('active');
    renderCatalog();
  }catch(e){
    errEl.textContent = "Connection error — try again.";
  }
}

function tryDeviceMemory(){
  const savedCode = localStorage.getItem('sde_partner_code');
  const savedPin = localStorage.getItem('sde_partner_pin');
  if(savedCode && savedPin){
    document.getElementById('codeInput').value = savedCode;
    document.getElementById('pinInput').value = savedPin;
    attemptUnlock();
  }
}

/* ============================================================
   PLAYBACK
   ============================================================ */
function loadTrack(i, autoplay=true){
  if(i < 0 || i >= catalog.length) return;
  currentIndex = i;
  const t = catalog[i];
  if(!t.src){ 
    document.getElementById('npTitle').textContent = t.title + " (audio not uploaded yet)";
    document.getElementById('npArtist').textContent = t.artist;
    document.getElementById('curTime').textContent = '0:00';
    document.getElementById('durTime').textContent = '0:00';
    document.getElementById('seekBar').value = 0;
    return;
  }
  audio.src = t.src;
  document.getElementById('npTitle').textContent = t.title;
  document.getElementById('npArtist').textContent = t.artist;
  document.getElementById('miniTitle').textContent = t.title;
  document.getElementById('miniArtist').textContent = t.artist;
  document.getElementById('miniPlayer').classList.add('show');
  if(autoplay){ audio.play(); }
  logEvent('play', t);
  pushRecent(t.id);
  renderCatalog();
}

function togglePlay(){
  if(currentIndex === -1){ loadTrack(0); return; }
  const t = catalog[currentIndex];
  if(!t.src){
    document.getElementById('npTitle').textContent = t.title + " (audio not uploaded yet)";
    return;
  }
  if(isPlaying){ audio.pause(); } else { audio.play(); }
}
audio.addEventListener('play', ()=>{ isPlaying = true; syncPlayUI(); });
audio.addEventListener('pause', ()=>{ isPlaying = false; syncPlayUI(); logEvent('pause', catalog[currentIndex]); });
audio.addEventListener('ended', ()=>{
  logEvent('complete', catalog[currentIndex]);
  if(repeatMode === 2){ audio.currentTime = 0; audio.play(); return; }
  nextTrack();
});

function syncPlayUI(){
  document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
  document.getElementById('miniPlayBtn').textContent = isPlaying ? '⏸' : '▶';
  document.getElementById('vinylDisc').classList.toggle('playing', isPlaying);
  document.getElementById('tonearm').classList.toggle('playing', isPlaying);
  document.getElementById('miniDisc').classList.toggle('playing', isPlaying);
}

function nextTrack(){
  if(catalog.length === 0) return;
  let i;
  if(shuffleOn){ i = Math.floor(Math.random()*catalog.length); }
  else { i = currentIndex + 1; if(i >= catalog.length){ i = repeatMode===1 ? 0 : currentIndex; if(repeatMode!==1) return; } }
  loadTrack(i);
}
function prevTrack(){
  if(currentIndex <= 0) return;
  loadTrack(currentIndex-1);
}
function toggleShuffle(){ shuffleOn = !shuffleOn; document.getElementById('shuffleBtn').classList.toggle('toggled', shuffleOn); }
function toggleRepeat(){
  repeatMode = (repeatMode+1)%3;
  const btn=document.getElementById('repeatBtn');
  btn.querySelector('.ic').textContent = repeatMode===2 ? '⟲¹' : '⟲';
  btn.querySelector('.lbl').textContent = repeatMode===2 ? 'Repeat 1' : 'Repeat';
  btn.classList.toggle('toggled', repeatMode>0);
}
function setVolume(v){ audio.volume = v; }

function fmtTime(s){
  if(!isFinite(s) || s < 0) s = 0;
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m + ':' + String(sec).padStart(2,'0');
}
function seekBy(deltaSeconds){
  if(!audio.src) return;
  audio.currentTime = Math.max(0, Math.min(audio.duration||0, audio.currentTime + deltaSeconds));
}
function seekTo(percent){
  if(!audio.src || !audio.duration) return;
  audio.currentTime = (percent/100) * audio.duration;
}
audio.addEventListener('loadedmetadata', ()=>{
  document.getElementById('durTime').textContent = fmtTime(audio.duration);
});
audio.addEventListener('timeupdate', ()=>{
  document.getElementById('curTime').textContent = fmtTime(audio.currentTime);
  if(audio.duration){
    document.getElementById('seekBar').value = (audio.currentTime/audio.duration)*100;
  }
});

function pushRecent(id){
  recentIds = recentIds.filter(x=>x!==id);
  recentIds.unshift(id);
  recentIds = recentIds.slice(0,15);
}

async function logEvent(type, track){
  if(!partnerCode || !track) return;
  try{
    await sb.from('songdrop_events').insert({
      partner_code: partnerCode,
      track_title: track.title,
      event_type: type,
      created_at: new Date().toISOString()
    });
  }catch(e){}
}

/* ============================================================
   DRAWER / CATALOG RENDER
   ============================================================ */
function setDrawerTab(tab){
  drawerTab = tab;
  document.querySelectorAll('.drawer-tabs button').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.getElementById('searchRow').style.display = tab==='catalog' ? 'block' : 'none';
  renderCatalog();
}

function renderCatalog(){
  const listEl = document.getElementById('trackList');
  let items = [];
  if(drawerTab === 'catalog'){
    const q = document.getElementById('searchInput').value.toLowerCase();
    items = catalog.filter(t => t.title.toLowerCase().includes(q));
  } else if(drawerTab === 'upnext'){
    items = currentIndex>=0 ? catalog.slice(currentIndex+1) : catalog;
  } else if(drawerTab === 'recent'){
    items = recentIds.map(id => catalog.find(t=>t.id===id)).filter(Boolean);
  }

  if(items.length === 0){
    listEl.innerHTML = '<div class="empty-row">Nothing here yet.</div>';
    return;
  }

  listEl.innerHTML = items.map((t) => {
    const realIndex = catalog.findIndex(c=>c.id===t.id);
    const isCurrent = realIndex === currentIndex;
    const numCell = (isCurrent && isPlaying)
      ? '<div class="eq-icon"><span></span><span></span><span></span></div>'
      : (realIndex+1);
    return `<div class="track-row ${isCurrent?'current':''}" onclick="loadTrack(${realIndex})">
      <div class="track-num">${numCell}</div>
      <div class="t-info"><div class="t-title">${t.title}</div></div>
      <div class="t-dur">${t.src ? '' : '—'}</div>
    </div>`;
  }).join('');
}

/* ============================================================
   ADMIN
   ============================================================ */
function openAdminGate(){
  document.getElementById('adminScreen').classList.add('show');
  document.getElementById('adminPinGate').style.display = 'flex';
  document.getElementById('adminContent').style.display = 'none';
}
function closeAdmin(){ document.getElementById('adminScreen').classList.remove('show'); }
async function checkAdminPin(){
  const val = document.getElementById('adminPinInput').value;
  const err = document.getElementById('adminPinError');
  if(val !== ADMIN_PIN){ err.textContent = "Incorrect PIN."; return; }
  err.textContent = "";
  document.getElementById('adminPinGate').style.display = 'none';
  document.getElementById('adminContent').style.display = 'block';
  await loadAdminData();
}
async function loadAdminData(){
  const [{data:partners},{data:sessions},{data:events}] = await Promise.all([
    sb.from('songdrop_partners').select('*'),
    sb.from('songdrop_sessions').select('*'),
    sb.from('songdrop_events').select('*')
  ]);
  const plays = (events||[]).filter(e=>e.event_type==='play').length;
  document.getElementById('adminStats').innerHTML = `
    <div class="stat-card"><div class="n">${(partners||[]).length}</div><div class="l">Partners</div></div>
    <div class="stat-card"><div class="n">${(sessions||[]).length}</div><div class="l">Sessions</div></div>
    <div class="stat-card"><div class="n">${plays}</div><div class="l">Total Plays</div></div>
    <div class="stat-card"><div class="n">${(events||[]).length}</div><div class="l">Total Events</div></div>
  `;
  document.getElementById('partnerListEl').innerHTML = (partners||[]).map(p=>{
    const lastActive = p.last_active ? new Date(p.last_active).toLocaleString() : 'never';
    return `<div class="partner-item">
      <div class="row1"><span>${p.code}</span><span>${p.name||''}</span></div>
      <div class="row2">${p.location||''} · last active ${lastActive}</div>
    </div>`;
  }).join('');
}

   INIT
   ============================================================ */
window.addEventListener('DOMContentLoaded', tryDeviceMemory);
</script>
